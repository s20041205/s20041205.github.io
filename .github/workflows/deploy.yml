name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into config.js
        run: |
          cat > config.js << 'EOF'
          const APP_CONFIG = {
              scriptWriteUrl: '${{ secrets.SCRIPT_WRITE_URL }}',
              scriptReadUrl:  '${{ secrets.SCRIPT_READ_URL }}'
          };
          EOF

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: main
          keep_files: true
